name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: # permite trigger manual pelo painel do GitHub

# Apenas um deploy por vez. Se novo push chega durante deploy, espera o atual terminar.
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull secrets from Doppler + SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for CI to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Typecheck, Lint, Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch prod secrets into workspace
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PROD }}
        run: |
          # appleboy/scp-action roda em Docker e só enxerga $GITHUB_WORKSPACE.
          # Por isso escrevemos o arquivo no workspace (não em /tmp).
          doppler secrets download \
            --no-file --format=env \
            --token="$DOPPLER_TOKEN" \
            > deploy.env
          echo "✓ Pulled $(wc -l < deploy.env) secrets from Doppler"

      - name: Copy .env to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'deploy.env'
          target: '/opt/blog-network/apps/api/'

      - name: Pull code + install + reload PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/blog-network

            echo "→ Fetching latest main"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Activating new .env"
            mv apps/api/deploy.env apps/api/.env

            echo "→ Installing dependencies (api only)"
            pnpm install --filter @bn/api... --frozen-lockfile

            echo "→ Reloading PM2 (zero-downtime when possible)"
            pm2 reload bn-api --update-env

            echo "→ Waiting for app to start"
            sleep 8

            echo "→ PM2 status"
            pm2 status

            echo "→ App logs (últimas 40 linhas)"
            pm2 logs bn-api --lines 40 --nostream || true

            echo "→ Smoke test"
            curl -fsS http://localhost:4000/health

            echo "✓ Deploy completed at $(date -u +%FT%TZ)"
