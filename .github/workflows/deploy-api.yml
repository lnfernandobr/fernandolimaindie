name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: # permite trigger manual pelo painel do GitHub

# Apenas um deploy por vez. Se novo push chega durante deploy, espera o atual terminar.
concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull secrets from Doppler + SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for CI to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Typecheck, Lint, Build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      - name: Pull code + install + reload PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/fernandolimaindie

            echo "→ Fetching latest main"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing dependencies (api only)"
            pnpm install --filter @fernandolimaindie/api... --frozen-lockfile

            echo "→ Reloading PM2 (zero-downtime when possible)"
            # Secrets injetados pelo Doppler CLI direto no processo (sem .env)
            pm2 reload fernandolimaindie-api --update-env

            echo "→ Smoke test"
            sleep 5
            curl -fsS http://localhost:4000/health

            echo "✓ Deploy completed at $(date -u +%FT%TZ)"
